{% extends 'base.html' %}
{% block title %}Mijozni tahrirlash{% endblock %}
{% block page %}Mijozni tahrirlash{% endblock %}
{% block client_active %}active{% endblock %}

{% block content %}

<div class="edit-form-container animate-slide-up">
    <div class="edit-form-header">
        <h3><i class="fas fa-pen"></i> Mijozni tahrirlash</h3>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="edit-form-body">
            <div class="form-group">
                <label class="form-label">FIO</label>
                <input type="text" name="name" value="{{ client.name }}" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">Do'kon nomi</label>
                <input type="text" name="shop_name" value="{{ client.shop_name }}" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">Manzili</label>
                <input type="text" name="address" value="{{ client.address }}" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">Qarzi</label>
                <input type="number" name="debt" value="{{ client.debt }}" class="form-control" step="any">
            </div>
        </div>
        <div class="edit-form-footer">
            <a href="{% url 'clients' %}" class="btn btn-ghost">Bekor qilish</a>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Saqlash</button>
        </div>
    </form>
</div>

{% endblock %}
