<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahsulotni o‘chirish tasdig‘i</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f3f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            width: 400px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 {
            margin-bottom: 15px;
            color: #333;
        }
        p {
            font-size: 16px;
            margin-bottom: 25px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-danger {
            background: #d9534f;
            color: white;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>{{ product.name }} mahsulotini o‘chirish</h2>
    <p>Siz ushbu mahsulotni o‘chirmoqchimisiz? Bu amal qaytarilmaydi.</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Ha, o‘chirilsin</button>
        <a href="{% url 'products' %}">
            <button type="button" class="btn btn-secondary" >Bekor qilish</button>
        </a>
    </form>
</div>

</body>
</html>
