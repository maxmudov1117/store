{% extends 'base.html' %}
{% block title %} Sotuvlar {% endblock %}
{% block page %} Sotuvlar {% endblock %}
{% block sale_active %} active {% endblock %}
{% block content %}
<!-- Modal body -->
<form method="post" id="edit-product-form" style="margin: 20px;">
    {% csrf_token %}
    <label>Maxsulot:</label>
    <select name="product_id" id="product" class="form-control">
        {% for product in products %}
        <option value="{{ product.id }}" {% if product.id == sale.product.id %}selected{% endif %}>
            {{ product.name }} ({{ product.quantity }} {{ product.unit }} mavjud!)
        </option>

        {% endfor %}
    </select>
    <br>
    <label>Miqdor:</label>
    <input type="number" name="quantity" value="{{ sale.quantity }}" id="new-product-brend"
           class="form-control">
    <br>
    <label>Mijoz:</label>
    <select name="client_id" id="client" class="form-control">
        {% for client in clients %}
        <option value="{{ client.id }}" {% if client.id == sale.client.id %} selected {% endif %}>
            {{ client.name }} {{ client.shop_name }}
        </option>
        {% endfor %}
    </select>
    <br>
    <label>Jami:</label>
    <input type="number" name="total_price" id="new-yarmi-amount"
           class="form-control" value="{{ sale.total_price }}">
    <br>
    <label>To'landi:</label>
    <input type="number" name="paid_price" id="new-jami-amount"
           class="form-control" value="{{ sale.paid_price }}">
    <br>
    <label>Qoldi:</label>
    <input type="number" name="debt_price" id="new-product-amount"
           class="form-control" value="{{ sale.debt_price }}">
    <br>
    <button type="submit" class="btn btn-success">Yangilash</button>
    <a href="{% url 'sales' %}">
        <button type="button" class="btn btn-danger" data-dismiss="modal">Yopish</button>
    </a>

</form>

{% endblock %}
