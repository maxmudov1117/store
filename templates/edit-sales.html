{% extends 'base.html' %}
{% block title %}Sotuvni tahrirlash{% endblock %}
{% block page %}Sotuvni tahrirlash{% endblock %}
{% block sale_active %}active{% endblock %}

{% block content %}

<div class="edit-form-container animate-slide-up">
    <div class="edit-form-header">
        <h3><i class="fas fa-pen"></i> Sotuvni tahrirlash</h3>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="edit-form-body">
            <div class="form-group">
                <label class="form-label">Mahsulot</label>
                <select name="product_id" class="form-control" required>
                    {% for product in products %}
                    <option value="{{ product.id }}" {% if product.id == sale.product.id %}selected{% endif %}>
                        {{ product.name }} ({{ product.quantity }} {{ product.unit }} mavjud)
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Miqdor</label>
                <input type="number" name="quantity" value="{{ sale.quantity }}" class="form-control" step="any" required>
            </div>
            <div class="form-group">
                <label class="form-label">Mijoz</label>
                <select name="client_id" class="form-control" required>
                    {% for client in clients %}
                    <option value="{{ client.id }}" {% if client.id == sale.client.id %}selected{% endif %}>
                        {{ client.name }} — {{ client.shop_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Jami summa</label>
                <input type="number" name="total_price" value="{{ sale.total_price }}" class="form-control" step="any">
            </div>
            <div class="form-group">
                <label class="form-label">To'landi</label>
                <input type="number" name="paid_price" value="{{ sale.paid_price }}" class="form-control" step="any">
            </div>
            <div class="form-group">
                <label class="form-label">Qoldi (qarz)</label>
                <input type="number" name="debt_price" value="{{ sale.debt_price }}" class="form-control" step="any">
            </div>
        </div>
        <div class="edit-form-footer">
            <a href="{% url 'sales' %}" class="btn btn-ghost">Bekor qilish</a>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Saqlash</button>
        </div>
    </form>
</div>

{% endblock %}
