<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish — Do'kon Boshqaruvi</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body>

<div class="login-page">
    <!-- Background Shapes -->
    <div class="login-bg-shape shape-1"></div>
    <div class="login-bg-shape shape-2"></div>
    <div class="login-bg-shape shape-3"></div>

    <div class="login-card">
        <div class="login-card-logo">
            <i class="fas fa-store"></i>
        </div>
        <h1 style="color: var(--color-primary); font-weight: 800; margin-bottom: 5px;">BekMax</h1>
        <p class="login-subtitle" style="margin-top: 0;">Markaziy Boshqaruv Tizimi</p>

        {% if error %}
        <div class="login-error">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label" for="username">Foydalanuvchi nomi</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="Username kiriting..." required autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Parol</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" class="form-control"
                           placeholder="Parolni kiriting..." required autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Kirish
            </button>
        </form>

        <div class="login-footer">
            Hisobingiz yo'qmi? <a href="/admin/">Admin bilan bog'laning</a>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('toggleIcon');
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        passwordInput.type = 'password';
        toggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>

</body>
</html>
