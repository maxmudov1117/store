{% extends 'base.html' %}
{% block title %}Qarz to'lovni tahrirlash{% endblock %}
{% block page %}Qarz to'lovni tahrirlash{% endblock %}
{% block pad_debt_active %}active{% endblock %}

{% block content %}

<div class="edit-form-container animate-slide-up">
    <div class="edit-form-header">
        <h3><i class="fas fa-pen"></i> Qarz to'lovni tahrirlash</h3>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="edit-form-body">
            <div class="form-group">
                <label class="form-label">Mijoz</label>
                <select name="client_id" class="form-control" required>
                    {% for client in clients %}
                    <option value="{{ client.id }}" {% if client.id == pay_debt.client.id %}selected{% endif %}>
                        {{ client.name }} — {{ client.shop_name }} — {{ client.debt|floatformat:0 }} so'm qarz
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">To'lanadigan qarz</label>
                <input type="number" name="price" value="{{ pay_debt.price }}" class="form-control" step="any" required>
            </div>
            <div class="form-group">
                <label class="form-label">Batafsil (izoh)</label>
                <input type="text" name="description" value="{{ pay_debt.description }}" class="form-control">
            </div>
        </div>
        <div class="edit-form-footer">
            <a href="{% url 'pay-debts' %}" class="btn btn-ghost">Bekor qilish</a>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Saqlash</button>
        </div>
    </form>
</div>

{% endblock %}
