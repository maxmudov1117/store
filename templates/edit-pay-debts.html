{% extends 'base.html' %}
{% block title %} To'langan qarzlar {% endblock %}
{% block page %} To'langan qarzlar {% endblock %}
{% block pad_debt_active %} active {% endblock %}
{% block content %}
<!-- Modal body -->
<form method="post" id="edit-product-form" style="margin: 20px;">
    {% csrf_token %}
    <label>Mijozlar:</label>
    <select name="client_id" id="client" class="form-control">
        {% for client in clients %}
        <option value="{{ client.id }}" {% if client.id == pay_debt.client.id %}selected{% endif %}>
            {{ client.name }} - {{ client.shop_name }} - {{ client.price }} mavjud!)
        </option>

        {% endfor %}
    </select>
    <br>
    <label>Qarz:</label>
    <input type="number" name="price" value="{{ pay_debt.price }}" id="new-product-brend"
           class="form-control">
    <br>
    <br>
    <label>Batafsil:</label>
    <input type="text" name="description" id="new-yarmi-amount"
           class="form-control" value="{{ pay_debt.description }}">
    <br>
    <button type="submit" class="btn btn-success">Yangilash</button>
    <a href="{% url 'pay-debts' %}">
        <button type="button" class="btn btn-danger" data-dismiss="modal">Yopish</button>
    </a>

</form>

{% endblock %}
