{% extends 'base.html' %}
{% block title %}Mahsulotni tahrirlash{% endblock %}
{% block page %}Mahsulotni tahrirlash{% endblock %}
{% block product_active %}active{% endblock %}

{% block content %}

<div class="edit-form-container animate-slide-up">
    <div class="edit-form-header">
        <h3><i class="fas fa-pen"></i> Mahsulotni tahrirlash</h3>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="edit-form-body">
            <div class="form-group">
                <label class="form-label">Nomi</label>
                <input type="text" name="name" value="{{ product.name }}" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">Brendi</label>
                <input type="text" name="brand" value="{{ product.brand }}" class="form-control">
            </div>
            <div class="form-group">
                <label class="form-label">Sotish narxi</label>
                <input type="number" name="price" value="{{ product.price }}" class="form-control" step="any">
            </div>
            <div class="form-group">
                <label class="form-label">Miqdori</label>
                <input type="number" name="quantity" value="{{ product.quantity }}" class="form-control" step="any">
            </div>
            <div class="form-group">
                <label class="form-label">O'lchov birligi</label>
                <input type="text" name="unit" value="{{ product.unit }}" class="form-control">
            </div>
        </div>
        <div class="edit-form-footer">
            <a href="{% url 'products' %}" class="btn btn-ghost">Bekor qilish</a>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Saqlash</button>
        </div>
    </form>
</div>

{% endblock %}
