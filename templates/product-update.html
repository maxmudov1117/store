{% extends 'base.html' %}

{% block title %} Maxsulot | Taxrirlash {% endblock %}
{% block page %} {{ product.name }} {% endblock %}
{% block content %}

<form method="post" id="edit-product-form" style=" margin: 20px;">
    {% csrf_token %}
    <label for="edit-product-name">Mahsulot nomi:</label>
    <input type="text" name="name" value=" {{product.name}} " placeholder="Mahsulot nomi..." id="edit-product-name"
           class="form-control" required>
    <br>
    <label for="edit-product-name">Brend nomi:</label>
    <input type="text" name="brand" value="{{ product.brand }}" placeholder="Brend nomi..."
           id="edit-product-" class="form-control" required>
    <br>
    <label for="edit-product-name">Mahsulot narxi:</label>
    <input type="number" name="price" value="{{ product.price|floatformat:2 }}" placeholder="Mahsulot narxi..."
           id="edit-product-price" class="form-control" required>
    <br>
    <label for="edit-product-name">Dona qoldi({{ product.unit }}):</label>
    <input type="number" name="quantity" value="{{ product.quantity }}" placeholder="Dona qoldi..."
           id="edit-product-amount" class="form-control" required>
    <br>
    <label for="edit-product-name">O'lchov birligi:</label>
    <input type="text" name="unit" value="{{ product.unit }}" placeholder="Dona qoldi..."
           id="edit-product-d" class="form-control" required>
    <br>

    <!-- Modal footer -->
    <button type="submit" class="btn btn-success">Yangilash</button>
    <a href="{% url 'products' %}">
        <button type="button" class="btn btn-danger" data-dismiss="modal">Yopish</button>
    </a>

</form>
{% endblock %}
