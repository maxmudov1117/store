{% extends 'base.html' %}
{% block title %}Kirimni tahrirlash{% endblock %}
{% block page %}Kirimni tahrirlash{% endblock %}
{% block import_product_active %}active{% endblock %}

{% block content %}

<div class="edit-form-container animate-slide-up">
    <div class="edit-form-header">
        <h3><i class="fas fa-pen"></i> Kirimni tahrirlash</h3>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="edit-form-body">
            <div class="form-group">
                <label class="form-label">Mahsulot</label>
                <select name="product_id" class="form-control" required>
                    {% for product in products %}
                    <option value="{{ product.id }}" {% if product.id == import_product.product.id %}selected{% endif %}>
                        {{ product.name }} ({{ product.quantity }} {{ product.unit }} mavjud)
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Miqdori</label>
                <input type="number" name="quantity" value="{{ import_product.quantity }}" class="form-control" step="any" required>
            </div>
            <div class="form-group">
                <label class="form-label">Sotib olingan narx</label>
                <input type="number" name="buy_price" value="{{ import_product.buy_price }}" class="form-control" step="any" required>
            </div>
        </div>
        <div class="edit-form-footer">
            <a href="{% url 'imports' %}" class="btn btn-ghost">Bekor qilish</a>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Saqlash</button>
        </div>
    </form>
</div>

{% endblock %}
