{% extends 'base.html' %}
{% block title %}{{ warning_title }}{% endblock %}
{% block page %}Ogohlantirish{% endblock %}

{% block content %}

<div class="warning-box animate-slide-up">
    <i class="fas fa-exclamation-circle" style="font-size: 2.5rem; color: var(--color-warning); margin-bottom: 16px; display: block;"></i>
    <h3 style="color: var(--color-warning); margin-bottom: 8px; font-size: 1.2rem;">{{ warning_title }}</h3>
    <p>{{ warning_message }}</p>
    <a href="{% url back_url %}" class="btn btn-ghost" style="margin-top: 8px;">
        <i class="fas fa-arrow-left"></i> Ortga qaytish
    </a>
</div>

{% endblock %}
